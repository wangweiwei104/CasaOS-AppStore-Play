name: Create Release

permissions:
  contents: write

on:
  push:
    # branches:
    #   - main
    paths:
      - '**.yml'
      - '**.json'
      - '!Apps_pre/**'
  # pull_request:
  #   types: [closed]
  #   branches:
  #     - main
  workflow_dispatch:
    inputs:
      tags:
        description: 'Test tags'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Number of commits to fetch. 0 indicates all history for all branches and tags.

      - name: Get Commit Messages
        id: get_commit_messages
        run: |
          # Get the latest tag
          LATEST_TAG=$(git tag --sort=-creatordate | head -n 1)

          # If there is no latest tag, get only the latest commit message
          if [ -z "$LATEST_TAG" ]; then
            COMMITS=$(git log -1 --pretty=format:'- %s (%h)')
          else
            COMMITS=$(git log --pretty=format:'- %s (%h)' --no-merges "$LATEST_TAG"..HEAD)
          fi

          # Output Multi-Line String
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Get the release date
          RELEASE_DATE=$(date +'%Y%m%d')
          echo "release_date=$RELEASE_DATE" >> $GITHUB_OUTPUT

      - name: Delete tag and release
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: new
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Filter and Create Release
        id: create_release
        run: |
          # Build universal
          zip AppStore.zip $(find . -type f \( -wholename "./*.json" -o -wholename "./Apps/*.yml" \))
          universal_count=$(find ./Apps/ -name "*.yml" | wc -l)

          # Build arm
          if [ -d "./Apps_arm" ]; then
            # 创建临时目录用于存放最终要打包的文件
            mkdir -p ./temp_arm/Apps
            
            # 1. 先复制Apps_arm中的所有yml文件（优先），保持目录结构
            find ./Apps_arm -type f -name "*.yml" | while read -r file; do
              # 获取相对路径（去掉./Apps_arm/前缀）
              rel_path="${file#./Apps_arm/}"
              # 创建目标目录
              mkdir -p "./temp_arm/Apps/$(dirname "$rel_path")"
              # 复制文件
              cp -f "$file" "./temp_arm/Apps/$(dirname "$rel_path")/"
            done
            
            # 2. 从原Apps中找出架构为arm的应用
            mapfile -t arm_apps < <(find ./Apps -type f -name "*.yml" -exec grep -lPz 'x-casaos:\s*\n\s*architectures:[\n\s\w-#]*- arm\s*\n' {} \;)
            
            # 3. 检查每个arm应用是否已存在于temp_arm/Apps中，保持目录结构
            for app in "${arm_apps[@]}"; do
              # 获取相对路径（去掉./Apps/前缀）
              rel_path="${app#./Apps/}"
              # 目标文件路径
              dest_path="./temp_arm/Apps/$rel_path"
              # 如果目标文件不存在，则复制过去
              if [ ! -f "$dest_path" ]; then
                # 创建目标目录
                mkdir -p "$(dirname "$dest_path")"
                cp -f "$app" "$dest_path"
              fi
            done
            
            # 4. 复制根目录的json文件
            cp -f ./*.json ./temp_arm/ 2>/dev/null || true
            
            # 5. 打包临时目录中的内容（保持目录结构）
            (cd ./temp_arm && zip -r ../AppStore_arm.zip .)
            
            # 6. 统计数量（只统计yml文件）
            arm_count=$(find ./temp_arm/Apps -type f -name "*.yml" | wc -l)
            
            # 7. 清理临时目录
            rm -rf ./temp_arm
          else
            # 如果没有Apps_arm目录，使用原逻辑
            zip AppStore_arm.zip $(find . -maxdepth 1 -type f -name "*.json" && find . -type f -wholename "./Apps/*.yml" -exec grep -rlPz 'x-casaos:\s*\n\s*architectures:[\n\s\w-#]*- arm\s*\n' {} \;)
            arm_count=$(find . -type f -wholename "./Apps/*.yml" -exec grep -rlPz 'x-casaos:\s*\n\s*architectures:[\n\s\w-#]*- arm\s*\n' {} \; | wc -l)
          fi

          git checkout -- ./Apps && git clean -df ./Apps

          # Build arm64
          [ -d "./Apps_arm64" ] && cp -rfu ./Apps_arm64/* ./Apps/
          zip AppStore_arm64.zip $(find . -type f -wholename "./*.json" && find . -type f -wholename "./Apps/*.yml" -exec grep -rlPz 'x-casaos:\s*\n\s*architectures:[\n\s\w-#]*- arm64\s*\n' {} \;)
          arm64_count=$(find . -type f -wholename "./Apps/*.yml" -exec grep -rlPz 'x-casaos:\s*\n\s*architectures:[\n\s\w-#]*- arm64\s*\n' {} \; | wc -l)
          git checkout -- ./Apps && git clean -df ./Apps

          # Build amd64
          [ -d "./Apps_amd64" ] && cp -rfu ./Apps_amd64/* ./Apps/
          zip AppStore_amd64.zip $(find . -type f -wholename "./*.json" && find . -type f -wholename "./Apps/*.yml" -exec grep -rlPz 'x-casaos:\s*\n\s*architectures:[\n\s\w-#]*- amd64\s*\n' {} \;)
          amd64_count=$(find . -type f -wholename "./Apps/*.yml" -exec grep -rlPz 'x-casaos:\s*\n\s*architectures:[\n\s\w-#]*- amd64\s*\n' {} \; | wc -l)

          echo "app_counts=universal($universal_count), arm($arm_count), arm64($arm64_count), amd64($amd64_count)" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload New Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AppStore.zip
            AppStore_arm.zip
            AppStore_arm64.zip
            AppStore_amd64.zip
          tag_name: new
          name: "v${{ steps.get_commit_messages.outputs.release_date }}"
          draft: false
          prerelease: false
          body: "## What's Changed\n\n${{ steps.get_commit_messages.outputs.commits }}\n\n📊 **App Counts:** ${{ steps.create_release.outputs.app_counts }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
