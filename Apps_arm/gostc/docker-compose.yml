name: gostc-arm
services:
  gostc-arm:
    container_name: gostc-arm
    hostname: gostc-arm
    image: sianhh/gostc:latest
    restart: unless-stopped
    network_mode: host
    privileged: false
    cpu_shares: 90
    command:
      - --tls=true
      - -addr
      - gost.sian.one
      - -key
      - xxxxxx-xxxx-xxxxxx-xxxxxx
    deploy:
      resources:
        limits:
          memory: 256M
    labels:
      org.opencontainers.image.icon: https://cdn.jsdelivr.net/gh/wangweiwei104/CasaOS-AppStore-Play@main/Apps_arm/gostc/icon.png
x-casaos:
  architectures:
    - arm
  main: gostc-arm
  author: WW
  category: Network
  description:
